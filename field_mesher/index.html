<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weaver v3.2.34</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #fff; color: #111; font-family: "SF Mono", monospace; overflow: hidden; touch-action: none; }
        #ui { 
            position: fixed; top: 0; width: 100%; background: rgba(255,255,255,0.95);
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 15px; border-bottom: 2px solid #000; z-index: 1000; box-sizing: border-box;
        }
        .brand { display: flex; flex-direction: column; }
        .title { font-weight: 900; font-size: 11px; letter-spacing: 0.1em; color: #ff00ff; }
        .version { font-size: 8px; font-weight: 800; color: #666; }
        .controls { display: flex; align-items: center; gap: 12px; }
        .slider-wrap { display: flex; flex-direction: column; align-items: center; }
        .slider-label { font-size: 7px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        input[type=range] { width: 70px; height: 4px; cursor: pointer; accent-color: #000; }
        .toggle-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .toggle-label { font-size: 7px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
        .toggle-btn { width: 40px; height: 18px; background: #eee; border: 1.5px solid #000; position: relative; }
        .toggle-btn.active { background: #ff3300; }
        .toggle-knob { width: 12px; height: 12px; background: #000; position: absolute; top: 1.5px; left: 2px; transition: 0.2s; }
        .toggle-btn.active .toggle-knob { left: 22px; background: #fff; }
        .stats { display: flex; flex-direction: column; text-align: right; font-size: 8px; font-weight: 900; line-height: 1.2; border-right: 1.5px solid #eee; padding-right: 12px; }
        .val { color: #ff3300; }
        button { height: 32px; padding: 0 12px; font-size: 10px; border-radius: 0; border: 2px solid #000; background: #000; color: #fff; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <div class="brand"><div class="title">WEAVER CORE</div><div class="version">v3.2.34</div></div>
    <div class="controls">
        <div class="toggle-wrap" onclick="toggleFlip()">
            <div class="toggle-label">Primary</div>
            <div class="toggle-btn" id="flipBtn"><div class="toggle-knob"></div></div>
            <div id="modeLabel" style="font-size:6px; margin-top:2px;">BLUE: LATERAL</div>
        </div>
        <div class="slider-wrap">
            <div class="slider-label">Cell Scale: <span id="densVal">50</span>u</div>
            <input type="range" id="densSlider" min="30" max="90" value="50" oninput="updateDensity(this.value)">
        </div>
        <div class="stats">
            <div>NODE <span class="val" id="stNodes">0</span></div>
            <div>BLUE <span class="val" id="stBlue">0</span></div>
            <div>RED <span class="val" id="stRed">0</span></div>
        </div>
        <button id="genBtn" onclick="generateTopology()">EXTRACT</button>
    </div>
</div>

<script>
let scene, camera, renderer, controls, allLines = [], isBuilding = false;
let nTotal = 0, bDist = 0, rDist = 0, activeSinks = [];
let flipSequence = false;

const CONFIG = { 
    microStep: 0.8, 
    poisson: 50, 
    precision: 0.000001, 
    lineThick: 8.0, 
    rungThick: 4.0, 
    boundary: { x: 380, y: 380 }, 
    selfMaskNodes: 35, // Ignore recent nodes
    mutualBuffer: 10,   // Tighter proximity (reduced from 16)
    selfCrowdBuffer: 18 // Stronger self-crowding check
};

function toggleFlip() {
    flipSequence = !flipSequence;
    document.getElementById('flipBtn').classList.toggle('active');
    document.getElementById('modeLabel').innerText = flipSequence ? "RED: STREAM" : "BLUE: LATERAL";
}

function updateDensity(v) {
    CONFIG.poisson = parseInt(v);
    document.getElementById('densVal').innerText = v;
}

function init() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0xffffff);
    camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 1, 5000);
    camera.up.set(0, 0, 1); camera.position.set(750, -750, 750); camera.lookAt(0, 0, 0);
    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);
    controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
    animate();
}

function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

const getV = (x, y) => { 
    return { u: Math.sin(y * 0.013) * 4.5 + Math.cos(x * 0.008) * 3.0, v: Math.cos(x * 0.013) * 4.5 + Math.sin(y * 0.008) * 3.0 }; 
};

function checkCollision(pA, pB, selfUID, parentUID, seed, color, isPrimary, currentLinePoints) {
    if (Math.abs(pB.x) > CONFIG.boundary.x || Math.abs(pB.y) > CONFIG.boundary.y) return { x: pB.x, y: pB.y, hit: true };
    
    // INTENSIFIED SELF-CROWDING
    if (isPrimary && currentLinePoints.length > CONFIG.selfMaskNodes) {
        for (let i = 0; i < currentLinePoints.length - CONFIG.selfMaskNodes; i++) {
            if (Math.hypot(currentLinePoints[i].x - pB.x, currentLinePoints[i].y - pB.y) < CONFIG.selfCrowdBuffer) return { x: pB.x, y: pB.y, hit: true };
        }
    }

    let closest = null;
    for (const line of allLines) {
        if (line.uid === selfUID) continue;

        // TIGHT MUTUAL CROWDING
        if (isPrimary && line.color === color) {
            for (let p of line.points) if (Math.hypot(p.x - pB.x, p.y - pB.y) < CONFIG.mutualBuffer) return { x: pB.x, y: pB.y, hit: true };
        }

        // HARD INTERSECTION
        for (let i = 0; i < line.points.length - 1; i++) {
            const p1 = line.points[i], p2 = line.points[i+1];
            if (line.uid === parentUID && Math.hypot(p1.x - seed.x, p1.y - seed.y) < 30) continue;
            const den = (p2.y - p1.y) * (pB.x - pA.x) - (p2.x - p1.x) * (pB.y - pA.y);
            if (Math.abs(den) < CONFIG.precision) continue;
            const ua = ((p2.x - p1.x) * (pA.y - p1.y) - (p2.y - p1.y) * (pA.x - p1.x)) / den;
            const ub = ((pB.x - pA.x) * (pA.y - p1.y) - (pB.y - pA.y) * (pA.x - p1.x)) / den;
            if (ua >= 0 && ua <= 1 && ub >= 0 && ub <= 1) { 
                const res = { x: pA.x + ua*(pB.x-pA.x), y: pA.y + ua*(pB.y-pA.y), t: ua }; 
                if (!closest || res.t < closest.t) closest = { ...res, hit: true }; 
            }
        }
    }
    return closest || { hit: false };
}

async function flow(seed, color, isPrimary = false, parentUID = null) {
    const directions = [1, -1]; const uid = Symbol();
    const isLateral = (color === 0x0066ff); const z = isLateral ? 0 : -1;
    for (const dir of directions) {
        let pts = [{...seed}], curr = {...seed};
        const geo = new THREE.BufferGeometry(), mat = new THREE.LineBasicMaterial({ color, linewidth: isPrimary ? CONFIG.lineThick : CONFIG.rungThick });
        const mesh = new THREE.Line(geo, mat); scene.add(mesh); 
        let pos = [seed.x, seed.y, z];
        let lineRef = { points: pts, color, uid };
        allLines.push(lineRef);

        for (let step = 0; step < 800; step++) {
            const v = getV(curr.x, curr.y);
            const a = isLateral ? Math.atan2(v.v, v.u) + Math.PI/2 : Math.atan2(v.v, v.u);
            const next = { x: curr.x + Math.cos(a)*CONFIG.microStep*dir, y: curr.y + Math.sin(a)*CONFIG.microStep*dir };
            
            const col = checkCollision(curr, next, uid, parentUID, seed, color, isPrimary, pts);
            if (col.hit) { pos.push(col.x, col.y, z); pts.push({x:col.x, y:col.y}); break; }
            pos.push(next.x, next.y, z); curr = next; pts.push({...curr}); nTotal++;
            if (isLateral) bDist += CONFIG.microStep; else rDist += CONFIG.microStep;
            
            if (step % 400 === 0) { geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3)); updateStats(); await new Promise(r => setTimeout(r, 0)); }
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    }
}

function updateStats() { document.getElementById('stNodes').innerText = nTotal; document.getElementById('stBlue').innerText = Math.round(bDist); document.getElementById('stRed').innerText = Math.round(rDist); }

async function generateTopology() {
    if (isBuilding) return; isBuilding = true;
    const btn = document.getElementById('genBtn'); btn.innerText = "...";
    while(scene.children.length > 0) scene.remove(scene.children[0]);
    allLines = []; nTotal = 0; bDist = 0; rDist = 0; activeSinks = [];
    
    scene.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(CONFIG.boundary.x*2, CONFIG.boundary.y*2, 2)), new THREE.LineBasicMaterial({ color: 0x999999 })));
    
    let rawFixed = []; const scanSize = 35;
    for (let y = -370; y <= 370; y += scanSize) { for (let x = -370; x <= 370; x += scanSize) { const v = getV(x, y); if (Math.hypot(v.u, v.v) < 0.7) rawFixed.push({x, y}); } }
    while(rawFixed.length > 0) {
        let s = rawFixed.shift(); let group = [s];
        for (let i = rawFixed.length - 1; i >= 0; i--) { if (Math.hypot(s.x - rawFixed[i].x, s.y - rawFixed[i].y) < 60) group.push(rawFixed.splice(i, 1)[0]); }
        let ax = group.reduce((a,b)=>a+b.x,0)/group.length, ay = group.reduce((a,b)=>a+b.y,0)/group.length;
        const dotGeo = new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute([ax, ay, 1], 3));
        scene.add(new THREE.Points(dotGeo, new THREE.PointsMaterial({ color: 0xff00ff, size: 8 })));
        activeSinks.push({ x: ax, y: ay, rad: 5 });
    }

    const primaryColor = flipSequence ? 0xff3300 : 0x0066ff;
    const secondaryColor = flipSequence ? 0x0066ff : 0xff3300;

    for (let y = -340; y <= 340; y += CONFIG.poisson) {
        for (let x = -340; x <= 340; x += CONFIG.poisson) {
            let clear = true;
            for(let l of allLines) { for(let p of l.points) if(Math.hypot(p.x-x, p.y-y) < CONFIG.poisson * 0.6) { clear = false; break; } if(!clear) break; }
            if(clear) await flow({x, y}, primaryColor, true);
        }
    }
    const primaryLines = allLines.filter(l => l.color === primaryColor);
    const rungGap = Math.floor(CONFIG.poisson * 0.7);
    for (let pLine of primaryLines) {
        for (let i = 25; i < pLine.points.length; i += rungGap) {
            const seed = pLine.points[i];
            let redundant = false;
            for (let l of allLines) {
                if (l.color === secondaryColor) {
                    for (let p of l.points) if (Math.hypot(p.x - seed.x, p.y - seed.y) < CONFIG.poisson * 0.6) { redundant = true; break; }
                }
                if (redundant) break;
            }
            if (!redundant) await flow(seed, secondaryColor, false, pLine.uid);
        }
    }
    isBuilding = false; btn.innerText = "EXTRACT";
}
init();
</script>
</body>
</html>
