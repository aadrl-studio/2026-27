<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHACODE | Trig Wharf - Project Portal</title>
    <style>
        :root { --accent: #00d4ff; --panel-bg: rgba(10, 10, 10, 0.95); --ui-border: rgba(0, 212, 255, 0.3); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        
        /* Interactive Splash Overlay */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; transition: opacity 0.8s ease, visibility 0.8s;
        }

        .portal-card {
            background: var(--panel-bg); padding: 40px; border: 1px solid var(--ui-border);
            text-align: center; max-width: 400px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        h2 { color: var(--accent); font-weight: 300; letter-spacing: 5px; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #888; font-size: 11px; margin-bottom: 30px; line-height: 1.6; }

        .begin-btn {
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 12px 30px; font-size: 10px; letter-spacing: 3px; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .begin-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

        #ui-overlay {
            position: absolute; top: 20px; left: 20px; color: #eee;
            background: var(--panel-bg); padding: 18px; border: 1px solid var(--ui-border); 
            line-height: 1.8; z-index: 10; font-size: 11px; display: none; /* Hidden until start */
        }
        kbd { background: #1a1a1a; padding: 2px 6px; color: var(--accent); border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="portal-card">
            <h2>TRIG WHARF</h2>
            <p>AADRL STUDIO 2026-27<br>Spatial Synthesis & Prosperity Engine<br>Educational Reference v1.0</p>
            <button class="begin-btn" onclick="startExperience()">Begin Analysis</button>
            <div style="margin-top: 20px;">
                <a href="https://github.com/aadrl-studio/2026-27/tree/main/prosperity-engine" 
                   style="color: #555; font-size: 9px; text-decoration: none; letter-spacing: 1px;">
                   VIEW SUBFOLDER TUTORIALS ↗
                </a>
            </div>
        </div>
    </div>
    
    <div id="ui-overlay">
        <b style="color:var(--accent)">CONTROLS</b><br>
        Navigate: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd><br>
        Verticality: <kbd>Space</kbd> | POV: <kbd>V</kbd>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.157.0/examples/jsm/",
                "@lumaai/luma-web": "https://unpkg.com/@lumaai/luma-web@0.2.0/dist/library/luma-web.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { LumaSplatsThree } from '@lumaai/luma-web';

        // --- Studio Asset Pathing ---
        const REPO_SUBDOMAIN = 'https://raw.githubusercontent.com/aadrl-studio/2026-27/main/prosperity-engine/';
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const splat = new LumaSplatsThree({
            source: 'https://lumalabs.ai/capture/da90e519-c6b1-4ad9-9051-05704b90220e'
        });
        scene.add(splat);
        splat.position.y = -1.2;

        // Shared variables for the "Start" function
        window.startExperience = () => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('ui-overlay').style.display = 'block';
            }, 800);

            // Trigger Pointer Lock
            document.body.requestPointerLock();
        };

        // --- Basic Avatar & Movement Logic (Condensed for clarity) ---
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch = Math.max(-0.7, Math.min(0.7, pitch - e.movementY * 0.002));
            }
        });

        // Simple Camera Loop
        function animate() {
            requestAnimationFrame(animate);
            if (document.pointerLockElement) {
                camera.rotation.set(pitch, yaw + Math.PI, 0, 'YXZ');
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
